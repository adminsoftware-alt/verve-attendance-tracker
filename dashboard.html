<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
    --border: #2e3348; --text: #e4e7ef; --text2: #8b90a5;
    --accent: #4f8cff; --accent2: #2d6bdf; --green: #34d399;
    --red: #f87171; --yellow: #fbbf24; --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .header h1 span { color: var(--accent); }
  .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .controls input, .controls select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px; }
  .controls button { background: var(--accent); color: #fff; border: none; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .controls button:hover { background: var(--accent2); }
  .controls button.active { background: var(--green); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.stale { background: var(--yellow); }
  .status-dot.off { background: var(--text2); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Tabs */
  .tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
  .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Content */
  .content { padding: 24px; max-width: 1600px; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Stats Row */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-card .label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card .value.accent { color: var(--accent); }
  .stat-card .value.green { color: var(--green); }
  .stat-card .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* Room Grid */
  .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .room-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.15s; }
  .room-card:hover { transform: translateY(-2px); }
  .room-card .room-header { padding: 12px 16px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .room-card .room-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .room-card .room-count { background: var(--accent); color: #fff; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 12px; min-width: 28px; text-align: center; }
  .room-card .room-count.empty { background: var(--border); color: var(--text2); }
  .room-card .room-count.crowded { background: var(--orange); }
  .room-card .participants { padding: 10px 16px; max-height: 200px; overflow-y: auto; }
  .room-card .participant { padding: 4px 0; font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); }
  .room-card .participant:last-child { border-bottom: none; }
  .room-card .participant .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

  /* Heatmap */
  .heatmap-container { overflow-x: auto; }
  .heatmap-table { border-collapse: collapse; width: 100%; min-width: 800px; }
  .heatmap-table th, .heatmap-table td { padding: 6px 4px; font-size: 11px; text-align: center; border: 1px solid var(--border); }
  .heatmap-table th { background: var(--surface2); color: var(--text2); font-weight: 500; position: sticky; top: 0; z-index: 1; }
  .heatmap-table th.room-th { text-align: left; padding-left: 12px; min-width: 200px; position: sticky; left: 0; z-index: 2; background: var(--surface2); }
  .heatmap-table td.room-td { text-align: left; padding-left: 12px; font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; position: sticky; left: 0; background: var(--surface); z-index: 1; }
  .heatmap-cell { border-radius: 3px; min-width: 32px; display: inline-block; }
  .heat-0 { background: transparent; color: var(--text2); }
  .heat-1 { background: #1a3a2a; color: #6ee7b7; }
  .heat-2 { background: #1a4a2a; color: #34d399; }
  .heat-3 { background: #2a5a2a; color: #fbbf24; }
  .heat-4 { background: #5a3a1a; color: #fb923c; }
  .heat-5 { background: #5a1a1a; color: #f87171; }

  /* Summary Table */
  .summary-table { width: 100%; border-collapse: collapse; }
  .summary-table th, .summary-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
  .summary-table th { background: var(--surface2); color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; }
  .summary-table tr:hover td { background: var(--surface2); }
  .summary-table .duration { font-weight: 600; }
  .room-tag { display: inline-block; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin: 2px; white-space: nowrap; }

  /* Search */
  .search-box { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 6px; font-size: 13px; width: 260px; margin-bottom: 16px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Floor filter */
  .floor-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .floor-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 5px 14px; border-radius: 16px; cursor: pointer; font-size: 12px; }
  .floor-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Team Management */
  .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .team-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .team-card .team-header { padding: 14px 16px; background: var(--surface2); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .team-card .team-name { font-size: 15px; font-weight: 600; }
  .team-card .team-meta { font-size: 11px; color: var(--text2); padding: 10px 16px; }
  .team-card .team-members-list { padding: 8px 16px; max-height: 180px; overflow-y: auto; }
  .team-card .member-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .team-card .member-row:last-child { border-bottom: none; }
  .team-card .team-actions { display: flex; gap: 6px; padding: 10px 16px; border-top: 1px solid var(--border); }

  .btn-sm { padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--red); color: #fff; opacity: 0.8; }
  .btn-danger:hover { opacity: 1; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { opacity: 0.85; }

  /* Modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 16px; font-size: 16px; }
  .modal label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Team Attendance */
  .attendance-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .attendance-header select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 13px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #1a3a2a; color: var(--green); }
  .badge-red { background: #3a1a1a; color: var(--red); }
  .badge-yellow { background: #3a3a1a; color: var(--yellow); }

  /* Monthly view */
  .monthly-table { width: 100%; border-collapse: collapse; }
  .monthly-table th, .monthly-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 12px; }
  .monthly-table th { background: var(--surface2); color: var(--text2); font-weight: 500; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; }
  .monthly-table tr:hover td { background: var(--surface2); }

  /* Participant picker */
  .participant-picker { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; margin-top: 8px; }
  .participant-picker .pick-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; font-size: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .participant-picker .pick-row:hover { background: var(--surface2); }
  .participant-picker .pick-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="header">
  <h1><span>Attendance</span> Dashboard</h1>
  <div class="controls">
    <input type="date" id="dateInput" />
    <button onclick="loadAll()">Load</button>
    <span style="color:var(--text2);font-size:12px;">|</span>
    <button id="autoRefreshBtn" onclick="toggleAutoRefresh()">Auto-Refresh: OFF</button>
    <span class="status-dot off" id="statusDot"></span>
    <span id="lastUpdate" style="font-size:11px;color:var(--text2);"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="live" onclick="switchTab('live')">Live View</div>
  <div class="tab" data-tab="heatmap" onclick="switchTab('heatmap')">Room Heatmap</div>
  <div class="tab" data-tab="summary" onclick="switchTab('summary')">Attendance Summary</div>
  <div class="tab" data-tab="teams" onclick="switchTab('teams')">Teams</div>
  <div class="tab" data-tab="teamview" onclick="switchTab('teamview')">Team View</div>
</div>

<div class="content">
  <!-- LIVE VIEW -->
  <div class="panel active" id="panel-live">
    <div class="stats" id="liveStats"></div>
    <div class="floor-filters" id="floorFilters"></div>
    <div class="room-grid" id="roomGrid">
      <div class="loading"><div class="spinner"></div>Select a date and click Load</div>
    </div>
  </div>

  <!-- HEATMAP -->
  <div class="panel" id="panel-heatmap">
    <div class="controls" style="margin-bottom:16px;">
      <label style="font-size:12px;color:var(--text2);">Interval:</label>
      <select id="heatmapInterval" onchange="loadHeatmap()">
        <option value="15" selected>15 min</option>
        <option value="30">30 min</option>
        <option value="60">1 hour</option>
      </select>
    </div>
    <div class="heatmap-container" id="heatmapContainer">
      <div class="loading"><div class="spinner"></div>Loading heatmap...</div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="panel" id="panel-summary">
    <input class="search-box" id="summarySearch" placeholder="Search by name or email..." oninput="filterSummary()" />
    <div id="summaryContainer">
      <div class="loading"><div class="spinner"></div>Loading summary...</div>
    </div>
  </div>

  <!-- TEAMS MANAGEMENT -->
  <div class="panel" id="panel-teams">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:14px;font-weight:600;">Manage Teams</div>
      <button class="btn-sm btn-primary" onclick="openCreateTeamModal()" style="padding:7px 16px;font-size:13px;">+ Create Team</button>
    </div>
    <div class="team-grid" id="teamsGrid">
      <div class="loading"><div class="spinner"></div>Loading teams...</div>
    </div>
    <div id="teamModal"></div>
  </div>

  <!-- TEAM VIEW (Attendance) -->
  <div class="panel" id="panel-teamview">
    <div class="attendance-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <select id="teamSelector" onchange="loadTeamAttendance()">
          <option value="">-- Select a Team --</option>
        </select>
        <span style="color:var(--text2);font-size:12px;">|</span>
        <label style="font-size:12px;color:var(--text2);">View:</label>
        <select id="teamViewMode" onchange="switchTeamView()">
          <option value="daily">Daily</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <select id="monthSelector">
          <option value="1">January</option><option value="2">February</option>
          <option value="3">March</option><option value="4">April</option>
          <option value="5">May</option><option value="6">June</option>
          <option value="7">July</option><option value="8">August</option>
          <option value="9">September</option><option value="10">October</option>
          <option value="11">November</option><option value="12">December</option>
        </select>
        <select id="yearSelector"></select>
        <button class="btn-sm btn-primary" onclick="loadTeamAttendance()">Load</button>
        <button class="btn-sm btn-green" onclick="downloadTeamCSV()" id="downloadCsvBtn" style="display:none;">Download CSV</button>
      </div>
    </div>
    <div id="teamAttendanceContainer">
      <div class="empty-state"><h3>Select a team</h3><p>Choose a team from the dropdown to view attendance.</p></div>
    </div>
  </div>
</div>

<script>
const BASE = window.location.origin;
let autoRefreshInterval = null;
let liveData = null;
let heatmapData = null;
let summaryData = null;
let activeFloor = 'all';

// Init
document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

function getDate() { return document.getElementById('dateInput').value; }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
}

function loadAll() {
  loadLive();
  loadHeatmap();
  loadSummary();
}

// ==================== LIVE VIEW ====================

async function loadLive() {
  const grid = document.getElementById('roomGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading live data...</div>';
  try {
    const res = await fetch(`${BASE}/attendance/live?date=${getDate()}`);
    liveData = await res.json();
    if (!liveData.success) throw new Error(liveData.error);
    renderLive();
    updateStatus(liveData.snapshot_time);
  } catch (e) {
    grid.innerHTML = `<div class="empty-state"><h3>No data</h3><p>${e.message}</p></div>`;
    updateStatus(null);
  }
}

function renderLive() {
  if (!liveData || !liveData.rooms) return;
  const rooms = liveData.rooms;

  // Stats
  const statsEl = document.getElementById('liveStats');
  const occupied = rooms.filter(r => r.participant_count > 0).length;
  const empty = rooms.length - occupied; // Not shown since we only get occupied rooms from BQ
  const peak = rooms.reduce((max, r) => Math.max(max, r.participant_count), 0);
  const peakRoom = rooms.find(r => r.participant_count === peak);

  statsEl.innerHTML = `
    <div class="stat-card"><div class="label">Total Participants</div><div class="value accent">${liveData.total_participants}</div></div>
    <div class="stat-card"><div class="label">Rooms Occupied</div><div class="value green">${liveData.total_rooms_occupied}</div></div>
    <div class="stat-card"><div class="label">Most Crowded</div><div class="value" style="font-size:16px;">${peakRoom ? peakRoom.room_name : '-'}</div><div class="sub">${peak} people</div></div>
    <div class="stat-card"><div class="label">Last Snapshot</div><div class="value" style="font-size:14px;">${formatSnapshotTime(liveData.snapshot_time)}</div></div>
  `;

  // Floor filters
  const floors = new Set();
  rooms.forEach(r => {
    const match = r.room_name.match(/^(\d+)\./);
    if (match) floors.add(match[1]);
  });
  const filtersEl = document.getElementById('floorFilters');
  let filterHtml = `<div class="floor-btn ${activeFloor === 'all' ? 'active' : ''}" onclick="setFloor('all')">All</div>`;
  [...floors].sort((a,b) => a-b).forEach(f => {
    filterHtml += `<div class="floor-btn ${activeFloor === f ? 'active' : ''}" onclick="setFloor('${f}')">Floor ${f}</div>`;
  });
  filtersEl.innerHTML = filterHtml;

  // Room cards
  const grid = document.getElementById('roomGrid');
  const filtered = activeFloor === 'all' ? rooms : rooms.filter(r => r.room_name.startsWith(activeFloor + '.'));

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No rooms</h3><p>No participants found for this filter.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(room => {
    const countClass = room.participant_count === 0 ? 'empty' : room.participant_count > 5 ? 'crowded' : '';
    const participants = room.participants.map(p =>
      `<div class="participant"><span class="dot"></span>${p.participant_name}${p.participant_email ? ' <span style="color:var(--text2)">(' + p.participant_email + ')</span>' : ''}</div>`
    ).join('');
    return `
      <div class="room-card">
        <div class="room-header">
          <div class="room-name" title="${room.room_name}">${room.room_name}</div>
          <div class="room-count ${countClass}">${room.participant_count}</div>
        </div>
        <div class="participants">${participants || '<div style="color:var(--text2);font-size:12px;padding:4px 0;">Empty</div>'}</div>
      </div>`;
  }).join('');
}

function setFloor(f) {
  activeFloor = f;
  renderLive();
}

// ==================== HEATMAP ====================

async function loadHeatmap() {
  const container = document.getElementById('heatmapContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading heatmap...</div>';
  const interval = document.getElementById('heatmapInterval').value;
  try {
    const res = await fetch(`${BASE}/attendance/heatmap/${getDate()}?interval=${interval}`);
    heatmapData = await res.json();
    if (!heatmapData.success) throw new Error(heatmapData.error);
    renderHeatmap();
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><h3>No heatmap data</h3><p>${e.message}</p></div>`;
  }
}

function renderHeatmap() {
  if (!heatmapData) return;
  const container = document.getElementById('heatmapContainer');
  const { rooms, time_slots } = heatmapData;

  if (!rooms.length || !time_slots.length) {
    container.innerHTML = '<div class="empty-state"><h3>No data</h3><p>No snapshots found for this date.</p></div>';
    return;
  }

  let html = '<table class="heatmap-table"><thead><tr><th class="room-th">Room</th>';
  time_slots.forEach(s => { html += `<th>${s}</th>`; });
  html += '<th>Peak</th><th>Avg</th></tr></thead><tbody>';

  rooms.forEach(room => {
    html += `<tr><td class="room-td" title="${room.room_name}">${room.room_name}</td>`;
    time_slots.forEach(slot => {
      const count = room.time_slots[slot] || 0;
      const heat = count === 0 ? 0 : count <= 1 ? 1 : count <= 2 ? 2 : count <= 4 ? 3 : count <= 6 ? 4 : 5;
      html += `<td class="heat-${heat}"><span class="heatmap-cell">${count || ''}</span></td>`;
    });
    html += `<td style="font-weight:600;color:var(--orange);">${room.peak_count}</td>`;
    html += `<td style="color:var(--text2);">${room.avg_count}</td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';

  // Legend
  html += `<div style="margin-top:16px;display:flex;gap:12px;align-items:center;font-size:11px;color:var(--text2);">
    <span>Occupancy:</span>
    <span class="heat-0" style="padding:2px 8px;border-radius:3px;">0</span>
    <span class="heat-1" style="padding:2px 8px;border-radius:3px;">1</span>
    <span class="heat-2" style="padding:2px 8px;border-radius:3px;">2</span>
    <span class="heat-3" style="padding:2px 8px;border-radius:3px;">3-4</span>
    <span class="heat-4" style="padding:2px 8px;border-radius:3px;">5-6</span>
    <span class="heat-5" style="padding:2px 8px;border-radius:3px;">7+</span>
  </div>`;

  container.innerHTML = html;
}

// ==================== SUMMARY ====================

async function loadSummary() {
  const container = document.getElementById('summaryContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading summary...</div>';
  try {
    const res = await fetch(`${BASE}/attendance/summary/${getDate()}`);
    summaryData = await res.json();
    if (!summaryData.success) throw new Error(summaryData.error);
    renderSummary();
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><h3>No summary data</h3><p>${e.message}</p></div>`;
  }
}

function renderSummary(filter = '') {
  if (!summaryData) return;
  const container = document.getElementById('summaryContainer');
  let participants = summaryData.participants || [];

  if (filter) {
    const f = filter.toLowerCase();
    participants = participants.filter(p =>
      (p.name || '').toLowerCase().includes(f) || (p.email || '').toLowerCase().includes(f)
    );
  }

  if (!participants.length) {
    container.innerHTML = '<div class="empty-state"><h3>No participants</h3><p>No attendance data found.</p></div>';
    return;
  }

  let html = `<div style="margin-bottom:12px;font-size:12px;color:var(--text2);">${participants.length} participants | Duration = First seen to Last seen (from snapshots)</div>`;
  html += `<div style="overflow-x:auto;"><table class="summary-table">
    <thead><tr>
      <th>Name</th><th>Email</th><th>First Seen (IST)</th><th>Last Seen (IST)</th><th>Duration</th><th>Room Visits</th>
    </tr></thead><tbody>`;

  participants.forEach(p => {
    const dur = p.total_duration_mins || 0;
    const durStr = dur >= 60 ? `${Math.floor(dur/60)}h ${dur%60}m` : `${dur}m`;
    const rooms = (p.room_visits || []).map(v =>
      `<span class="room-tag">${v.room_name} [${v.room_joined_ist}-${v.room_left_ist}] ${v.room_duration_mins}m</span>`
    ).join(' ');

    html += `<tr>
      <td style="font-weight:500;">${p.name}</td>
      <td style="color:var(--text2);">${p.email || '-'}</td>
      <td>${p.first_seen_ist || '-'}</td>
      <td>${p.last_seen_ist || '-'}</td>
      <td class="duration" style="color:${dur >= 60 ? 'var(--green)' : 'var(--yellow)'};">${durStr}</td>
      <td>${rooms || '<span style="color:var(--text2);">-</span>'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function filterSummary() {
  renderSummary(document.getElementById('summarySearch').value);
}

// ==================== AUTO-REFRESH ====================

function toggleAutoRefresh() {
  const btn = document.getElementById('autoRefreshBtn');
  if (autoRefreshInterval) {
    clearInterval(autoRefreshInterval);
    autoRefreshInterval = null;
    btn.textContent = 'Auto-Refresh: OFF';
    btn.classList.remove('active');
    document.getElementById('statusDot').className = 'status-dot off';
  } else {
    autoRefreshInterval = setInterval(() => loadLive(), 30000);
    btn.textContent = 'Auto-Refresh: 30s';
    btn.classList.add('active');
    document.getElementById('statusDot').className = 'status-dot live';
    loadLive(); // immediate load
  }
}

function updateStatus(snapshotTime) {
  const el = document.getElementById('lastUpdate');
  if (!snapshotTime) {
    el.textContent = '';
    return;
  }
  el.textContent = 'Updated: ' + new Date().toLocaleTimeString();
  if (autoRefreshInterval) {
    const dot = document.getElementById('statusDot');
    const snapshotDate = new Date(snapshotTime);
    const ageMinutes = (Date.now() - snapshotDate.getTime()) / 60000;
    dot.className = ageMinutes < 2 ? 'status-dot live' : ageMinutes < 10 ? 'status-dot stale' : 'status-dot off';
  }
}

function formatSnapshotTime(ts) {
  if (!ts) return '-';
  try {
    const d = new Date(ts);
    // Add 5:30 for IST display
    d.setMinutes(d.getMinutes() + 330);
    return d.toISOString().slice(11, 19) + ' IST';
  } catch { return ts; }
}

// ==================== TEAMS MANAGEMENT ====================

let teamsData = [];
let allParticipants = [];

async function loadTeams() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div>Loading teams...</div>';
  try {
    const res = await fetch(`${BASE}/teams`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    teamsData = data.teams;
    renderTeams();
    populateTeamSelector();
  } catch (e) {
    grid.innerHTML = `<div class="empty-state"><h3>Could not load teams</h3><p>${e.message}</p></div>`;
  }
}

function renderTeams() {
  const grid = document.getElementById('teamsGrid');
  if (!teamsData.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No teams yet</h3><p>Click "Create Team" to get started.</p></div>';
    return;
  }
  grid.innerHTML = teamsData.map(t => `
    <div class="team-card">
      <div class="team-header">
        <div class="team-name">${t.team_name}</div>
        <span class="badge badge-green">${t.member_count} members</span>
      </div>
      <div class="team-meta">
        ${t.manager_name ? 'Manager: ' + t.manager_name + (t.manager_email ? ' (' + t.manager_email + ')' : '') : 'No manager assigned'}
      </div>
      <div class="team-actions">
        <button class="btn-sm btn-outline" onclick="openTeamDetail('${t.team_id}')">Manage Members</button>
        <button class="btn-sm btn-outline" onclick="openEditTeamModal('${t.team_id}', '${t.team_name.replace(/'/g, "\\'")}', '${(t.manager_name||'').replace(/'/g, "\\'")}', '${(t.manager_email||'').replace(/'/g, "\\'")}')">Edit</button>
        <button class="btn-sm btn-danger" onclick="deleteTeam('${t.team_id}', '${t.team_name.replace(/'/g, "\\'")}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function populateTeamSelector() {
  const sel = document.getElementById('teamSelector');
  const current = sel.value;
  sel.innerHTML = '<option value="">-- Select a Team --</option>';
  teamsData.forEach(t => {
    sel.innerHTML += `<option value="${t.team_id}" ${t.team_id === current ? 'selected' : ''}>${t.team_name}</option>`;
  });
}

function openCreateTeamModal() {
  document.getElementById('teamModal').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Create New Team</h3>
        <label>Team Name *</label>
        <input id="modalTeamName" placeholder="e.g. Finance Team" />
        <label>Manager Name</label>
        <input id="modalManagerName" placeholder="e.g. John Doe" />
        <label>Manager Email</label>
        <input id="modalManagerEmail" placeholder="e.g. john@company.com" />
        <div class="modal-actions">
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn-sm btn-primary" onclick="createTeam()">Create</button>
        </div>
      </div>
    </div>`;
}

function openEditTeamModal(teamId, name, manager, email) {
  document.getElementById('teamModal').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Edit Team</h3>
        <label>Team Name</label>
        <input id="modalTeamName" value="${name}" />
        <label>Manager Name</label>
        <input id="modalManagerName" value="${manager}" />
        <label>Manager Email</label>
        <input id="modalManagerEmail" value="${email}" />
        <div class="modal-actions">
          <button class="btn-sm btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn-sm btn-primary" onclick="updateTeam('${teamId}')">Save</button>
        </div>
      </div>
    </div>`;
}

async function createTeam() {
  const name = document.getElementById('modalTeamName').value.trim();
  if (!name) return alert('Team name is required');
  try {
    const res = await fetch(`${BASE}/teams`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        team_name: name,
        manager_name: document.getElementById('modalManagerName').value.trim(),
        manager_email: document.getElementById('modalManagerEmail').value.trim()
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    closeModal();
    loadTeams();
  } catch (e) { alert('Error: ' + e.message); }
}

async function updateTeam(teamId) {
  try {
    const res = await fetch(`${BASE}/teams/${teamId}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        team_name: document.getElementById('modalTeamName').value.trim(),
        manager_name: document.getElementById('modalManagerName').value.trim(),
        manager_email: document.getElementById('modalManagerEmail').value.trim()
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    closeModal();
    loadTeams();
  } catch (e) { alert('Error: ' + e.message); }
}

async function deleteTeam(teamId, name) {
  if (!confirm(`Delete team "${name}" and all its members?`)) return;
  try {
    const res = await fetch(`${BASE}/teams/${teamId}`, { method: 'DELETE' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    loadTeams();
  } catch (e) { alert('Error: ' + e.message); }
}

async function openTeamDetail(teamId) {
  try {
    const [teamRes, partRes] = await Promise.all([
      fetch(`${BASE}/teams/${teamId}`),
      fetch(`${BASE}/teams/participants`)
    ]);
    const teamData = await teamRes.json();
    const partData = await partRes.json();
    if (!teamData.success) throw new Error(teamData.error);
    allParticipants = partData.success ? partData.participants : [];

    const team = teamData.team;
    const memberNames = new Set(team.members.map(m => m.participant_name.toLowerCase().trim()));

    const membersList = team.members.map(m => `
      <div class="member-row">
        <span>${m.participant_name} ${m.participant_email ? '<span style="color:var(--text2)">(' + m.participant_email + ')</span>' : ''}</span>
        <button class="btn-sm btn-danger" onclick="removeMember('${teamId}', '${m.member_id}')">Remove</button>
      </div>
    `).join('') || '<div style="padding:8px 0;color:var(--text2);font-size:12px;">No members yet</div>';

    document.getElementById('teamModal').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <h3>${team.team_name} - Members</h3>
          <div style="margin-bottom:12px;">${membersList}</div>
          <div style="border-top:1px solid var(--border);padding-top:12px;">
            <label>Add Member</label>
            <input id="memberSearchInput" placeholder="Search participants..." oninput="filterParticipantPicker('${teamId}')" />
            <div class="participant-picker" id="participantPicker"></div>
          </div>
          <div class="modal-actions">
            <button class="btn-sm btn-outline" onclick="closeModal();loadTeams();">Done</button>
          </div>
        </div>
      </div>`;

    // Show available participants
    filterParticipantPicker(teamId, memberNames);
  } catch (e) { alert('Error: ' + e.message); }
}

function filterParticipantPicker(teamId, existingMembers) {
  const search = (document.getElementById('memberSearchInput')?.value || '').toLowerCase();
  const picker = document.getElementById('participantPicker');
  if (!picker) return;

  // If existingMembers not passed, fetch from current team detail
  if (!existingMembers) {
    // Re-derive from DOM is tricky, just show all and let server handle duplicates
    existingMembers = new Set();
  }

  const filtered = allParticipants.filter(p => {
    const name = (p.participant_name || '').toLowerCase();
    const email = (p.participant_email || '').toLowerCase();
    return (name.includes(search) || email.includes(search)) && !existingMembers.has(name);
  }).slice(0, 50);

  picker.innerHTML = filtered.map(p => `
    <div class="pick-row" onclick="addMember('${teamId}', '${p.participant_name.replace(/'/g, "\\'")}', '${(p.participant_email||'').replace(/'/g, "\\'")}')">
      <span>${p.participant_name} ${p.participant_email ? '<span style="color:var(--text2)">(' + p.participant_email + ')</span>' : ''}</span>
      <span style="color:var(--green);font-size:16px;">+</span>
    </div>
  `).join('') || '<div style="padding:8px 12px;color:var(--text2);font-size:12px;">No matching participants</div>';
}

async function addMember(teamId, name, email) {
  try {
    const res = await fetch(`${BASE}/teams/${teamId}/members`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ participant_name: name, participant_email: email })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    openTeamDetail(teamId); // Refresh
  } catch (e) { alert('Error: ' + e.message); }
}

async function removeMember(teamId, memberId) {
  try {
    const res = await fetch(`${BASE}/teams/${teamId}/members/${memberId}`, { method: 'DELETE' });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    openTeamDetail(teamId); // Refresh
  } catch (e) { alert('Error: ' + e.message); }
}

function closeModal() {
  document.getElementById('teamModal').innerHTML = '';
}

// ==================== TEAM VIEW (Attendance) ====================

let teamAttendanceData = null;
let teamMonthlyData = null;

// Init year/month selectors
(function initTeamViewSelectors() {
  const now = new Date();
  const yearSel = document.getElementById('yearSelector');
  for (let y = now.getFullYear(); y >= now.getFullYear() - 2; y--) {
    yearSel.innerHTML += `<option value="${y}" ${y === now.getFullYear() ? 'selected' : ''}>${y}</option>`;
  }
  document.getElementById('monthSelector').value = now.getMonth() + 1;
})();

function switchTeamView() {
  loadTeamAttendance();
}

async function loadTeamAttendance() {
  const teamId = document.getElementById('teamSelector').value;
  if (!teamId) return;

  const mode = document.getElementById('teamViewMode').value;
  const container = document.getElementById('teamAttendanceContainer');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading team attendance...</div>';

  if (mode === 'daily') {
    document.getElementById('downloadCsvBtn').style.display = 'none';
    await loadTeamDailyView(teamId);
  } else {
    document.getElementById('downloadCsvBtn').style.display = '';
    await loadTeamMonthlyView(teamId);
  }
}

async function loadTeamDailyView(teamId) {
  const container = document.getElementById('teamAttendanceContainer');
  try {
    const date = getDate();
    const res = await fetch(`${BASE}/teams/${teamId}/attendance/${date}`);
    teamAttendanceData = await res.json();
    if (!teamAttendanceData.success) throw new Error(teamAttendanceData.error);
    renderTeamDaily();
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

function renderTeamDaily() {
  const d = teamAttendanceData;
  const container = document.getElementById('teamAttendanceContainer');

  // Stats cards
  let html = `
    <div style="margin-bottom:12px;font-size:13px;font-weight:600;">${d.team_name} ${d.manager_name ? '(Manager: ' + d.manager_name + ')' : ''}</div>
    <div class="stats">
      <div class="stat-card"><div class="label">Total Members</div><div class="value accent">${d.total_members}</div></div>
      <div class="stat-card"><div class="label">Present</div><div class="value green">${d.present_count}</div></div>
      <div class="stat-card"><div class="label">Absent</div><div class="value" style="color:var(--red);">${d.absent_count}</div></div>
      <div class="stat-card"><div class="label">Attendance %</div><div class="value" style="color:${d.total_members ? (d.present_count/d.total_members*100 >= 80 ? 'var(--green)' : 'var(--yellow)') : 'var(--text2)'};">${d.total_members ? Math.round(d.present_count/d.total_members*100) : 0}%</div></div>
    </div>`;

  // Table
  html += `<div style="overflow-x:auto;"><table class="summary-table">
    <thead><tr>
      <th>Name</th><th>Email</th><th>Status</th><th>First Seen</th><th>Last Seen</th>
      <th>Active</th><th>Break Time</th><th>Breaks</th><th>Isolation</th>
    </tr></thead><tbody>`;

  d.participants.forEach(p => {
    const active = p.total_duration_mins || 0;
    const activeStr = active >= 60 ? `${Math.floor(active/60)}h ${active%60}m` : `${active}m`;
    const breakStr = p.break_minutes >= 60 ? `${Math.floor(p.break_minutes/60)}h ${p.break_minutes%60}m` : `${p.break_minutes}m`;
    const isoStr = p.isolation_minutes >= 60 ? `${Math.floor(p.isolation_minutes/60)}h ${p.isolation_minutes%60}m` : `${p.isolation_minutes}m`;
    const statusBadge = p.status === 'present'
      ? '<span class="badge badge-green">Present</span>'
      : '<span class="badge badge-red">Absent</span>';

    html += `<tr style="${p.status === 'absent' ? 'opacity:0.5;' : ''}">
      <td style="font-weight:500;">${p.name}</td>
      <td style="color:var(--text2);">${p.email || '-'}</td>
      <td>${statusBadge}</td>
      <td>${p.first_seen_ist || '-'}</td>
      <td>${p.last_seen_ist || '-'}</td>
      <td class="duration" style="color:${active >= 60 ? 'var(--green)' : active > 0 ? 'var(--yellow)' : 'var(--text2)'};">${p.status === 'present' ? activeStr : '-'}</td>
      <td style="color:${p.break_minutes > 30 ? 'var(--orange)' : 'var(--text2)'};">${p.status === 'present' ? breakStr : '-'}</td>
      <td style="color:var(--text2);">${p.status === 'present' ? p.break_count : '-'}</td>
      <td style="color:${p.isolation_minutes > 30 ? 'var(--red)' : 'var(--text2)'};">${p.status === 'present' ? isoStr : '-'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

async function loadTeamMonthlyView(teamId) {
  const container = document.getElementById('teamAttendanceContainer');
  try {
    const year = document.getElementById('yearSelector').value;
    const month = document.getElementById('monthSelector').value;
    const res = await fetch(`${BASE}/teams/${teamId}/report/monthly?year=${year}&month=${month}`);
    teamMonthlyData = await res.json();
    if (!teamMonthlyData.success) throw new Error(teamMonthlyData.error);
    renderTeamMonthly();
  } catch (e) {
    container.innerHTML = `<div class="empty-state"><h3>Error</h3><p>${e.message}</p></div>`;
  }
}

function renderTeamMonthly() {
  const d = teamMonthlyData;
  const container = document.getElementById('teamAttendanceContainer');

  let html = `<div style="margin-bottom:12px;font-size:13px;font-weight:600;">${d.team_name} - Monthly Summary (${d.start_date} to ${d.end_date})</div>`;

  // Member summary cards
  if (d.member_summary && d.member_summary.length) {
    html += `<div style="margin-bottom:20px;"><h4 style="font-size:13px;color:var(--text2);margin-bottom:10px;">MEMBER SUMMARY</h4>`;
    html += `<div style="overflow-x:auto;"><table class="monthly-table">
      <thead><tr>
        <th>Name</th><th>Email</th><th>Days Present</th><th>Total Active</th><th>Total Break</th><th>Total Isolation</th>
      </tr></thead><tbody>`;
    d.member_summary.forEach(m => {
      const activeStr = m.total_active_mins >= 60 ? `${Math.floor(m.total_active_mins/60)}h ${m.total_active_mins%60}m` : `${m.total_active_mins}m`;
      const breakStr = m.total_break_mins >= 60 ? `${Math.floor(m.total_break_mins/60)}h ${m.total_break_mins%60}m` : `${m.total_break_mins}m`;
      const isoStr = m.total_isolation_mins >= 60 ? `${Math.floor(m.total_isolation_mins/60)}h ${m.total_isolation_mins%60}m` : `${m.total_isolation_mins}m`;
      html += `<tr>
        <td style="font-weight:500;">${m.name}</td>
        <td style="color:var(--text2);">${m.email || '-'}</td>
        <td><span class="badge badge-green">${m.days_present}</span></td>
        <td style="color:var(--green);">${activeStr}</td>
        <td style="color:var(--orange);">${breakStr}</td>
        <td style="color:var(--text2);">${isoStr}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div>';
  }

  // Daily breakdown
  if (d.daily_data && d.daily_data.length) {
    html += `<h4 style="font-size:13px;color:var(--text2);margin-bottom:10px;">DAILY BREAKDOWN</h4>`;
    html += `<div style="overflow-x:auto;"><table class="monthly-table">
      <thead><tr>
        <th>Date</th><th>Name</th><th>Email</th><th>First Seen</th><th>Last Seen</th>
        <th>Active</th><th>Break</th><th>Isolation</th>
      </tr></thead><tbody>`;
    d.daily_data.forEach(r => {
      const activeStr = r.active_minutes >= 60 ? `${Math.floor(r.active_minutes/60)}h ${r.active_minutes%60}m` : `${r.active_minutes}m`;
      html += `<tr>
        <td>${r.date}</td>
        <td style="font-weight:500;">${r.name}</td>
        <td style="color:var(--text2);">${r.email || '-'}</td>
        <td>${r.first_seen_ist || '-'}</td>
        <td>${r.last_seen_ist || '-'}</td>
        <td style="color:var(--green);">${activeStr}</td>
        <td style="color:var(--orange);">${r.break_minutes}m</td>
        <td style="color:var(--text2);">${r.isolation_minutes}m</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  } else {
    html += '<div class="empty-state"><h3>No data</h3><p>No attendance data found for this month.</p></div>';
  }

  container.innerHTML = html;
}

function downloadTeamCSV() {
  const teamId = document.getElementById('teamSelector').value;
  if (!teamId) return alert('Select a team first');
  const year = document.getElementById('yearSelector').value;
  const month = document.getElementById('monthSelector').value;
  window.open(`${BASE}/teams/${teamId}/report/monthly?year=${year}&month=${month}&format=csv`, '_blank');
}

// Load teams when switching to teams/teamview tab
const origSwitchTab = switchTab;
switchTab = function(tab) {
  origSwitchTab(tab);
  if (tab === 'teams') loadTeams();
  if (tab === 'teamview') { loadTeams(); }
};
</script>
